--primary:#B30F19;
--primary-dark:#870811;

/*=====================================================================
    BODY
======================================================================*/

body{

    background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;

    min-height:100vh;

    overflow-x:hidden;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    color:var(--gray-900);

    position:relative;

}


/*=====================================================================
    FUNDO DECORATIVO
======================================================================*/

body::before{

    content:"";

    position:fixed;

    width:480px;
    height:480px;

    left:-220px;
    top:-180px;

    border-radius:50%;

    background:

    radial-gradient(

        circle,

        rgba(255,255,255,.95),

        rgba(255,255,255,.40),

        transparent

    );

    z-index:-5;

}

body::after{

    content:"";

    position:fixed;

    width:500px;
    height:500px;

    right:-240px;
    top:80px;

    border-radius:50%;

    background:

    radial-gradient(

        circle,

        rgba(255,255,255,.92),

        rgba(255,255,255,.35),

        transparent

    );

    z-index:-5;

}


/*=====================================================================
    BACKGROUND SVG
======================================================================*/

.background{

    position:fixed;

    inset:0;

    overflow:hidden;

    pointer-events:none;

    z-index:-10;

}

.background-svg{

    width:100%;

    height:100%;

}


/*=====================================================================
    ONDA VERMELHA ESQUERDA
======================================================================*/

.background::before{

    content:"";

    position:absolute;

    width:850px;
    height:700px;

    left:-420px;
    bottom:-250px;

    border-radius:50%;

    transform:rotate(-18deg);

    background:

    linear-gradient(

        135deg,

        #E02B39,

        #B30F19,

        #7E0810

    );

}


/*=====================================================================
    ONDA DIREITA
======================================================================*/

.background::after{

    content:"";

    position:absolute;

    width:620px;
    height:500px;

    right:-280px;
    bottom:-120px;

    border-radius:50%;

    transform:rotate(18deg);

    background:

    linear-gradient(

        140deg,

        rgba(220,35,50,.92),

        rgba(150,8,18,.95)

    );

}


/*=====================================================================
    APP
======================================================================*/

.app{

    width:100%;

        24px
        30px;

/*=====================================================================
    LOCATE & GO
    CSS PROFISSIONAL
    PARTE 2/10

    ✔ Card Principal
    ✔ Glassmorphism Premium
    ✔ Ícone
    ✔ Títulos
    ✔ Divider
    ✔ Texto

======================================================================*/


/*=====================================================================
    CARD PRINCIPAL
======================================================================*/

.card{

    width:100%;

    background:
        rgba(255,255,255,.94);

    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);

    border-radius:34px;

    padding:
        38px
        30px
        34px;

    position:relative;

    overflow:hidden;

    display:flex;

    flex-direction:column;

    align-items:center;

    border:

        1px solid
        rgba(255,255,255,.55);

    box-shadow:

        0 35px 70px rgba(0,0,0,.10),

        0 15px 30px rgba(0,0,0,.06),

        inset 0 1px 0 rgba(255,255,255,.70);

    transition:

        transform .45s ease,
        box-shadow .45s ease;

}


/*=====================================================================
    HOVER CARD
======================================================================*/

.card:hover{

    transform:

        translateY(-8px);

    box-shadow:

        0 50px 90px rgba(0,0,0,.14),

        0 20px 45px rgba(0,0,0,.08),

        inset 0 1px 0 rgba(255,255,255,.80);

}


/*=====================================================================
    BRILHO SUPERIOR
======================================================================*/

.card::before{

    content:"";

    position:absolute;

    width:320px;
    height:320px;

    right:-170px;
    top:-180px;

    border-radius:50%;

    background:

        radial-gradient(

            rgba(255,255,255,.95),

            rgba(255,255,255,.10),

            transparent

        );

}


/*=====================================================================
    BRILHO INFERIOR
======================================================================*/

.card::after{

    content:"";

    position:absolute;

    width:250px;
    height:250px;

    left:-150px;
    bottom:-150px;

    border-radius:50%;

    background:

        radial-gradient(

            rgba(215,25,40,.08),

            transparent

        );

}


/*=====================================================================
    ELEMENTOS ACIMA DOS EFEITOS
======================================================================*/

.card>*{

    position:relative;

    z-index:2;

}


/*=====================================================================
    ÍCONE
======================================================================*/

.card-icon{

    width:90px;
    height:90px;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    margin-bottom:4px;

    background:

        linear-gradient(

            145deg,

            #D82436,

            #A10D18

        );

    color:#fff;

    font-size:36px;

    box-shadow:

        0 18px 35px rgba(179,15,25,.35),

        inset 0 2px 6px rgba(255,255,255,.28);

    position:relative;

    overflow:hidden;

}


/*=====================================================================
    REFLEXO DO ÍCONE
======================================================================*/

.card-icon::before{

    content:"";

    position:absolute;

    left:-120%;
    top:0;

    width:70%;
    height:100%;

    transform:skewX(-20deg);

    background:

        linear-gradient(

            90deg,

            transparent,

            rgba(255,255,255,.55),

            transparent

        );

    transition:.9s;

}


.card:hover .card-icon::before{

    left:180%;

}


/*=====================================================================
    CÍRCULO EXTERNO
======================================================================*/

.card-icon::after{

    content:"";

    position:absolute;

    width:112px;
    height:112px;

    border-radius:50%;

    border:2px dashed rgba(179,15,25,.18);

}


/*=====================================================================
    ANIMAÇÃO FLUTUANTE
======================================================================*/

.card-icon{

    animation:

        floatIcon 4s ease-in-out infinite;

}

@keyframes floatIcon{

0%{

transform:translateY(0);

}

50%{

transform:translateY(-5px);

}

100%{

transform:translateY(0);

}

}


/*=====================================================================
    TÍTULO
======================================================================*/

.card h1{

    font-size:2rem;

    font-weight:700;

    color:var(--gray-900);

    margin-bottom:4px;

    text-align:center;

    letter-spacing:.3px;

}


/*=====================================================================
    DIVISOR
======================================================================*/

.divider{

    width:80px;

    height:6px;

    border-radius:50px;

    margin-bottom:18px;

    background:

        linear-gradient(

            90deg,

            var(--primary),

            var(--primary-light)

        );

    box-shadow:

        0 5px 15px rgba(179,15,25,.20);

}


/*=====================================================================
    TEXTO
======================================================================*/

.card p{

    width:100%;

    max-width:280px;

    text-align:center;

    font-size:.97rem;

    line-height:1.8;

    color:var(--gray-600);

}


/*=====================================================================
    ÁREA DOS BOTÕES
======================================================================*/

.buttons{

    width:100%;

    display:flex;

    flex-direction:column;

    gap:14px;

}


/*=====================================================================
    ANIMAÇÃO DE ENTRADA
======================================================================*/

.card{

    opacity:0;

    animation:

        cardEntrance

        .9s ease forwards;

}

@keyframes cardEntrance{

from{

    opacity:0;

    transform:

        translateY(60px)
        scale(.96);

}

to{

    opacity:1;

    transform:

        translateY(0)
        scale(1);

}

}


/*=====================================================================
    PULSE DO CARD
======================================================================*/

.card:hover{

    animation:

        pulseShadow 2s infinite;

}

@keyframes pulseShadow{

0%{

box-shadow:

0 35px 70px rgba(0,0,0,.10);

}

50%{

box-shadow:

0 45px 90px rgba(179,15,25,.14);

}

100%{

box-shadow:

0 35px 70px rgba(0,0,0,.10);

}

}


/*=====================================================================
    RESPONSIVIDADE
======================================================================*/

@media(max-width:600px){

.card{

padding:

30px
22px
26px;

border-radius:28px;

width:78px;

/*=====================================================================
    BOTÕES PRINCIPAIS
======================================================================*/

.btn{

    width:100%;

    height:82px;

    border-radius:14px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 16px;

    color:white;

    text-transform:uppercase;

    font-size:1rem;

    font-weight:800;

    letter-spacing:.5px;

    position:relative;

    overflow:hidden;

    cursor:pointer;

    transition:.35s ease;

    box-shadow:

        0 15px 30px rgba(0,0,0,.18);

}


/* brilho interno */

.btn::before{

    content:"";

    position:absolute;

    inset:0;

    background:

    linear-gradient(

        120deg,

        rgba(255,255,255,.25),

        transparent 35%

    );

    opacity:.5;

}



/* conteúdo acima do brilho */

.btn > div,
.btn > span{

    position:relative;

    z-index:2;

}


/*=====================================================================
    ÁREA DO ÍCONE
======================================================================*/

.btn div{

    display:flex;

    align-items:center;

    gap:22px;

}


/* círculo do ícone */

.btn i{

    width:58px;

    height:58px;

    border-radius:50%;


    display:flex;

    align-items:center;

    justify-content:center;


    font-size:26px;


    background:

    rgba(255,255,255,.18);


    border:

    1px solid

    rgba(255,255,255,.20);


    color:white;


    backdrop-filter:blur(10px);


}



/* seta */

.btn > span:last-child{

    font-size:3rem;

    font-weight:300;

    line-height:0;

}



/*=====================================================================
    BOTÃO EMPRESÁRIO
======================================================================*/

.empresa{

    background:

    linear-gradient(

        135deg,

        #D51F30,

        #A30712

    );


    box-shadow:

    0 18px 35px

    rgba(179,15,25,.45);

}



.empresa:hover{

    transform:

    translateY(-5px);


    box-shadow:

    0 25px 45px

    rgba(179,15,25,.55);

}



/*=====================================================================
    BOTÃO CLIENTE
======================================================================*/

.cliente{


    background:

    linear-gradient(

        135deg,

        #08756F,

        #004C49

    );


    box-shadow:

    0 18px 35px

}



.cliente:hover{


    transform:

    translateY(-5px);


    box-shadow:

    0 25px 45px

    rgba(0,90,85,.55);


}



/*=====================================================================
    ANIMAÇÃO DO CLIQUE
======================================================================*/

.btn:active{


    transform:

    scale(.96);


}



/*=====================================================================
    EFEITO DE LUZ PASSANDO
======================================================================*/

.btn::after{


    content:"";


    position:absolute;


    top:0;

    left:-120%;


    width:80%;


    height:100%;


    background:


    linear-gradient(

        90deg,

        transparent,

        rgba(255,255,255,.45),

        transparent

    );


    transform:skewX(-25deg);


    transition:.8s;


}



.btn:hover::after{


    left:130%;


}

    LOGIN
======================================================================*/

    width:100%;


    margin-top:18px;

    flex-direction:column;
