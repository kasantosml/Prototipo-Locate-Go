<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerência de Produtos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="tema.css">

<style>
:root{
  --primary:#8c0a0a;

  /* títulos */
  --titulo-cor:#8c0a0a;
  --bg:#f1f1f1;
  --card:#ffffff;
  --radius:18px;
  --primary:#8c0a0a;
  --bg:#f1f1f1;
  --card:#ffffff;
  --radius:18px;
}

[data-theme="dark"]{
  --titulo-cor:#ffffff;

  --bg:#0c0e14;
  --card:#161923;
  --texto:#e8ecf4;
  --input:#1e2130;
  --borda:rgba(255,255,255,.07);
  --footer:#161923;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:var(--bg);
  color:var(--texto,#222);
}

/* HEADER */
header{
  background:linear-gradient(135deg,#b11212,#7d0505);
  color:#fff;
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:14px;
}

header i{
  font-size:22px;
  cursor:pointer;
   color:var(--header-icon);
}

header img{
  width:48px;
  border-radius:50%;
  margin-left: 130px;
}

.header-spacer{
  flex:1;
}

/* MENU */
.menu{
  position:absolute;
  right:18px;
  top:70px;
  background:var(--card);
  color:var(--texto);
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  overflow:hidden;
  transform:scale(0);
  transform-origin:top right;
  transition:.2s;
  z-index:10;
  width: 50%;
  background: #7d0505;
}

.menu.active{ transform:scale(1); }

.menu button{
  width:100%;
  padding:15px;
  border:none;
  background:none;
  text-align:left;
  cursor:pointer;
  color:var(--texto);
  transition:.2s;
}

.menu button:hover{
  background:var(--primary);
  color:#000000;
}

/* MAIN */
main{
  padding:20px;
  padding-bottom:160px;
}

#contador{
  font-weight:bold;
  margin-bottom:20px;
}

/* PRODUTO CARD */
.produto{
  background:var(--card);
  color:var(--texto);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:18px;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
  border:1px solid var(--borda);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.produto.selected{
  outline:3px solid var(--primary);
}

h1,
h2,
h3,
h4,
h5,
h6,
#contador{
  color:var(--titulo-cor);
}

/* IMAGE CARD */
.image-card{
  width:100%;
  height:160px;
   background:var(--input,#e0e0e0);
  border:1px solid var(--borda);
  color:var(--texto);
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
}

.image-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FORM */
.produto input,
.produto textarea{
  width:100%;
  border:none;
  outline:none;
  font-size:16px;
  background:transparent;
  color:var(--texto);
}

textarea{ resize:none; }

.produto input::placeholder,
.produto textarea::placeholder{
  color:#8b95a8;
}

/* BOTÕES */
.add-btn{
  position:fixed;
  bottom:150px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#000;
  color:#fff;
  font-size:26px;
  cursor:pointer;
}

.save-btn{
  position:fixed;
  bottom:80px;
  right:20px;
  padding:14px 22px;
  border-radius:30px;
  border:none;
  background:var(--primary);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/*=========================
FOOTER
=========================*/

footer{

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    height:70px;

    display:flex;

    justify-content:space-around;

    align-items:center;

    background:var(--footer);

    border-top:1px solid var(--border);

    box-shadow:0 -3px 12px rgba(0,0,0,.08);

    z-index:999;

}

footer button{

    width:55px;

    height:55px;

    border:none;

    background:none;

    border-radius:50%;

    color:var(--muted);

    font-size:22px;

    cursor:pointer;

    transition:.25s;

}

footer button:hover{

    color:var(--primary);

    background:rgba(129,10,10,.08);

}

footer button.active{

    color:var(--primary);

    background:rgba(129,10,10,.12);

}

[data-theme="dark"] footer button.active{
    color:#fff;
    background:rgba(208, 10, 10, 0.234);
}

/*=========================
PESQUISA
=========================*/

.pesquisa{
    display:flex;
    align-items:center;
    gap:10px;

    margin:25px 0;

    padding:12px 15px;

    background:var(--card);

    border:1px solid var(--border);

    border-radius:14px;

    box-shadow:var(--shadow);
}

.pesquisa i{
    color:var(--text-secondary);
    font-size:18px;
}

.pesquisa input{

    flex:1;

    border:none;

    outline:none;

    background:transparent;

    color:var(--text);

    font-size:16px;

}

.pesquisa input::placeholder{

    color:var(--text-secondary);

}


</style>
</head>

<body>

<header>
  <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
  <img src="locate.png">
  <div class="header-spacer"></div>
  <i class="fa-solid fa-bars" id="menuBtn"></i>

  <div class="menu" id="menu">
    <button data-action="alfabetica">Ordem Alfabética</button>
    <button data-action="maior-preco">Maior Preço</button>
    <button data-action="menor-preco">Menor Preço</button>
    <button data-action="excluir">Excluir Selecionado</button>
  </div>
</header>

<main>
  <h2>Catálogo de Produtos</h2><br>
  <div id="contador">00 PRODUTOS</div>
  <div class="pesquisa">
    <i class="fa-solid fa-magnifying-glass"></i>

    <input
        type="text"
        id="pesquisaProdutos"
        placeholder="Pesquisar Produtos..."
        autocomplete="off">
</div>
  <div id="lista"></div>
</main>

<button class="add-btn" id="add">+</button>
<button class="save-btn" id="save">Salvar</button>

<footer>
<button onclick="window.location.href='cadastro.fila.online.html'" id="inicio"><i class="fa-solid fa-house" id="home"></i></button>
<button onclick="window.location.href='catalogoEmpresario.prototipo.html'" id="produto" class="active"><i class="fa-solid fa-clipboard-list"></i></button>
<button onclick="window.location.href='fila.online.html'"><i class="fa-solid fa-users-line" id="fila"></i></button>
<button onclick="window.location.href='perfilEmpresario.prototipo.html'" id="perfil"><i class="fa-solid fa-user"></i></button>
<button onclick="window.location.href='Confi.prototipo.html'" id="confi"><i class="fa-solid fa-gear"></i></button>
</footer>

<script type="module">

  import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

  import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  deleteDoc,
  doc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvXF36Fi9K25Ub1czRkZ_G9OQ_dwcm5rk",
  authDomain: "locatego.firebaseapp.com",
  projectId: "locatego",
  storageBucket: "locatego.firebasestorage.app",
  messagingSenderId: "904411855752",
  appId: "1:904411855752:web:8a2cb38545cba994d3d83d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let produtos = [];
let selecionados = [];

const lista = document.getElementById('lista');
const contador = document.getElementById('contador');
const addBtn = document.getElementById('add');
const saveBtn = document.getElementById('save');
const menuBtn = document.getElementById('menuBtn');
const menu = document.getElementById('menu');
const pesquisaProdutos = document.getElementById("pesquisaProdutos");


menuBtn.onclick = () => menu.classList.toggle('active');

//FIREBASE
const produtosRef = query(
    collection(db,"produtos"),
    orderBy("nome")
);

onSnapshot(produtosRef,(snapshot)=>{ produtos = []; snapshot.forEach((docItem)=>{ produtos.push({ id: docItem.id, ...docItem.data() }); }); render(); });

async function registrarLog(
  acao,
  dados = {}
){

  try{

    await addDoc(
      collection(db,"logs"),
      {
        pagina: "/catalogoEmpresario.prototipo.html",
        acao,
        dados,
        horario: serverTimestamp(),
        navegador: navigator.userAgent,
        tipo: "empresa"
      }
    );

  }catch(erro){

    console.error(erro);

  }

}

/* CONVERTE PREÇO */
function precoNumero(p){
  if(!p) return 0;
  return Number(
    p.replace('R$','')
     .replace(/\./g,'')
     .replace(',','.')
  );
}

function render(){
  lista.innerHTML='';

  produtos.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='produto';

    card.innerHTML=`
      <div class="image-card">
        ${p.imagem ? `<img src="${p.imagem}">` : `<span>Adicionar foto</span>`}
        <input type="file" hidden>
      </div>
      <input placeholder="Nome do produto" value="${p.nome||''}">
      <textarea placeholder="Descrição">${p.desc||''}</textarea>
      <input placeholder="R$ 0,00" value="${p.preco||''}" class="preco">
    `;

    card.onclick = () => {

    if (selecionados.includes(p.id)) {

        selecionados = selecionados.filter(id => id !== p.id);
        card.classList.remove("selected");

    } else {

        selecionados.push(p.id);
        card.classList.add("selected");

    }

};

    const [img,file,nome,desc,preco]=card.querySelectorAll(
      '.image-card,input[type=file],input:not([type=file]),textarea'
    );

    img.onclick=()=>file.click();

   file.onchange = async (e) => {

    const arquivo = e.target.files[0];

    if (!arquivo) return;

    const referencia = ref(
        storage,
        `produtos/${p.id}/${arquivo.name}`
    );

    await uploadBytes(referencia, arquivo);

    const url = await getDownloadURL(referencia);

    await updateDoc(
        doc(db, "produtos", p.id),
        {
            imagem: url
        }
    );

    registrarLog("adicionou_imagem_produto", {
        produto: p.nome || "Sem nome"
    });

};

      registrarLog(
  "adicionou_imagem_produto",
  {
    produto: p.nome || "Sem nome"
  }
);
    
nome.onchange= async (e) => {

    p.nome = e.target.value;

    await updateDoc(
        doc(db,"produtos",p.id),
        {
            nome: p.nome
        }
    );

};

desc.onchange = async (e) => {

    p.desc = e.target.value;

    await updateDoc(
        doc(db,"produtos",p.id),
        {
            desc: p.desc
        }
    );

};

preco.onblur = async (e) => {

    p.preco = e.target.value;

    await updateDoc(
        doc(db, "produtos", p.id),
        {
            preco: p.preco
        }
    );

};

lista.appendChild(card);

});

  contador.textContent =
    String(produtos.length).padStart(2,'0') + ' PRODUTOS';

 ativarMascaraPreco();   
}

render()

registrarLog(
  "acessou_catalogo"
);

/* ADD */
addBtn.onclick = async () => {

    await addDoc(collection(db,"produtos"),{

        nome:"",
        desc:"",
        preco:"",
        imagem:"",
        criadoEm:serverTimestamp()

    });

    registrarLog("adicionou_produto");

};

/* SALVAR */
saveBtn.onclick = () => {

    alert("Produtos salvos com sucesso!");

};

/* MENU */
menu.onclick = async (e) => {

    if (!e.target.dataset.action) return;

    if (e.target.dataset.action === "alfabetica") {

        produtos.sort((a, b) =>
            a.nome.localeCompare(b.nome, "pt-BR")
        );

        registrarLog("ordenou_alfabeticamente");

        render();

    }

    else if (e.target.dataset.action === "maior-preco") {

        produtos.sort((a, b) =>
            precoNumero(b.preco) - precoNumero(a.preco)
        );

        registrarLog("ordenou_maior_preco");

        render();

    }

    else if (e.target.dataset.action === "menor-preco") {

        produtos.sort((a, b) =>
            precoNumero(a.preco) - precoNumero(b.preco)
        );

        registrarLog("ordenou_menor_preco");

        render();

    }

    if(
    e.target.dataset.action==="excluir" &&
    selecionados.length>0
){

        for(const id of selecionados){

    await deleteDoc(
        doc(db,"produtos",id)
    );

}

selecionados = [];
}
    menu.classList.remove("active");
};


//mascara de preço
function formatarPrecoInput(input){
  input.addEventListener('input', () => {
    let valor = input.value.replace(/\D/g,'');

    if(valor === '') {
      input.value = '';
      return;
    }

    valor = (parseInt(valor,10) / 100).toFixed(2);
    valor = valor.replace('.', ',');
    valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, '.');

    input.value = 'R$ ' + valor;
  });

  input.addEventListener('focus', () => {
    if(input.value === '') input.value = 'R$ 0,00';
  });

  input.addEventListener('blur', () => {
    if(input.value === 'R$ 0,00') input.value = '';
  });
}

/* APLICA EM TODOS OS INPUTS */
function ativarMascaraPreco(){
  document.querySelectorAll('.preco').forEach(input => {
    if(!input.dataset.mask){
      formatarPrecoInput(input);
      input.dataset.mask = 'true';
    }
  });
}

/* ATIVA AO CARREGAR */
ativarMascaraPreco();

//PESQUISAR
pesquisaProdutos.addEventListener("input", () => {

    const texto = pesquisaProdutos.value.toLowerCase();

    document.querySelectorAll(".produto").forEach(card => {

        const nome = card.querySelector('input:not([type="file"])')
            .value
            .toLowerCase();

        card.style.display =
            nome.includes(texto)
            ? "flex"
            : "none";

    });

});





</script>

<script src="tema.js"></script>

</body>
</html>
