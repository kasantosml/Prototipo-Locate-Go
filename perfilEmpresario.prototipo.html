<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDITAR PERFIL - EMPRESÁRIO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="tema.css">

<style>

:root{
  --principal:#8c0a0a;

  /* títulos e labels */
  --titulo-cor:#8c0a0a;

  /* MODO CLARO */
  --bg:#f2f2f2;
  --card:#ffffff;
  --texto:#222222;
  --texto-sec:#666666;
  --input:#ffffff;
  --borda:#d8d8d8;
  --footer:#ffffff;

  --header1:#d30e0e;
  --header2:#9a0505;

  --foto-borda:#8c0a0a;

  --shadow:0 6px 14px rgba(0,0,0,.1);

  transition: .3s;

  --primary:#d30e0e;
--primary-dark:#850909;

--surface:#ffffff;
--surface-2:#f5f5f5;

--text-light:#666;
}

/* =========================
   MODO ESCURO
========================= */

[data-theme="dark"]{
   --titulo-cor:#ffffff;

--surface:#161923;
--surface-2:#252b38;

--text-light:#d5d5d5;
  --bg:#0c0e14;
  --card:#161923;
  --texto:#e8ecf4;
  --texto-sec:#8b95a8;
  --input:#1e2130;
  --borda:rgba(255,255,255,.07);
  --footer:#161923;

  --header1:#161923;
  --header2:#0c0e14;

  --foto-borda:#2d3548;

  --shadow:0 2px 20px rgba(0,0,0,.45);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:var(--bg);
  color:var(--texto);
  transition:.3s;
}

/* =========================
   HEADER
========================= */

header{
   background:linear-gradient(135deg,#b11212,#7d0505);
  padding:18px;
  display:flex;
  justify-content:center;
  align-items:center;
}

header img{
  width:56px;
  border-radius:50px;
}

/* =========================
   ALERTA
========================= */

.alerta{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:var(--principal);
  color:#fff;
  padding:12px 18px;
  border-radius:12px;
  font-size:14px;
  z-index:999;
  animation:sumir 4s forwards;
}

@keyframes sumir{
  0%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;}
}

/* =========================
   CONTAINER
========================= */

.container{
  max-width:650px;
  margin:auto;
  padding:40px 16px 120px;
}

.container2{
  margin:10px;
}

/* =========================
   CARD
========================= */

.card{
  background:var(--card);
  color:var(--texto);
  border-radius:16px;
  padding:22px;
  border:1px solid var(--borda);
  box-shadow:var(--shadow);
  transition:.3s;
}

/* =========================
   FOTO PERFIL
========================= */

.profile-card{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.profile-card div{
  width:110px;
  height:110px;
  border-radius:50%;
  border:3px dashed var(--foto-borda);
  cursor:pointer;
  overflow:hidden;
  transition:.3s;
}

.profile-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-card i{
  font-size:32px;
  color:var(--foto-borda);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
}

/* =========================
   TÍTULOS
========================= */

h1,
h2,
h3,
h4,
h5,
h6{
  color:var(--texto);
  color:var(--titulo-cor);
}

.section h3{
  color:var(--titulo-cor);
  margin-bottom:8px;
}

/* =========================
   LABELS
========================= */

label{
  display:block;
  margin-top:14px;
  font-size:13px;
  font-weight:bold;
  color:var(--titulo-cor);
  text-transform:uppercase;
}

/* =========================
   INPUTS
========================= */

input,
textarea{
  width:100%;
  margin-top:6px;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--borda);
  background:var(--input);
  color:var(--texto);
  font-size:14px;
  transition:.3s;
}

input:focus,
textarea:focus{
  outline:none;
  border-color:var(--principal);
}

textarea{
  resize:none;
}

input::placeholder,
textarea::placeholder{
  color:var(--texto-sec);
}

/* =========================
   AVALIAÇÕES
========================= */

.avaliacao{
  font-size:22px;
  color:var(--texto);
  margin-bottom:15px;
}

#comentarios, .ora {
  margin-top: 15px;
  display: flex;
  font-size: 14px;
  gap: 42px;
  text-align: center;
}

.infos  {
  
  display: block;
  align-items: center;
  text-align: center;
}

.ora {
  margin-left: 10px;
  margin-bottom: 20px;
}

#totalServicos{
  font-size:22px;
  color:var(--texto);
}

.avaliacao i{
  color:gold;
}

/* =========================
   CONTATOS
========================= */

.contato{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.contato-item{
  display:flex;
  align-items:center;
  gap:10px;

  background:var(--input);
  border:1px solid var(--borda);
  border-radius:10px;
  padding:10px 12px;
}

.contato-item i{
  font-size:18px;
  color:var(--texto);
}

.contato-item input{
  border:none;
  background:transparent;
  color:var(--texto);
  margin:0;
  padding:0;
}

.contato-item input:focus{
  border:none;
}

.contato-item input::placeholder{
  color:var(--texto-sec);
}

/* =========================
   BOTÕES
========================= */

button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--principal);
  color:white;
  font-size:14px;
  cursor:pointer;
  text-transform:uppercase;
}

button:hover{
  opacity:.95;
}

.btn-gerencia{
  background:#444;
}

/*=========================
FOOTER
=========================*/

footer{

position:fixed;

bottom:16px;

left:16px;

right:16px;

height:70px;

display:flex;

justify-content:space-around;

align-items:center;

background:rgba(255,255,255,.90);

backdrop-filter:blur(16px);

border-radius:24px;

border:1px solid rgba(255,255,255,.25);

box-shadow:

0 18px 45px rgba(15,23,42,.18);

z-index:99999;

}

[data-theme="dark"] footer{

background:rgba(22,25,35,.92);

border:1px solid rgba(255,255,255,.08);

}


.nav-item, .active{

    width:70px;

    height:60px;

    border:none;

    background:none;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    gap:4px;

    color:var(--text-light);

    font-size:11px;

    cursor:pointer;

}

.nav-item i, .active{

    font-size:21px;

}

.active span {
  font-size: 10px;
}

.nav-item.active{

    color:#d30e0e;

    font-weight:700;

}

.nav-item.active i {

    color:#d30e0e;

}

/*======================================================
                BOTÕES
======================================================*/

footer button{

width:54px;

height:54px;

margin-bottom: 15px;

border:none;

background:none;

border-radius:18px;

display:flex;

justify-content:center;

align-items:center;

cursor:pointer;

transition:.20s;

color:var(--text-light);

font-size:22px;

}

footer button:hover{

background:var(--surface-2);

transform:translateY(-2px);

}

footer button.active{

background:

linear-gradient(

135deg,

var(--primary),

var(--primary-dark)

);

color:white;

box-shadow:

0 10px 20px rgba(211,14,14,.30);

}


[data-theme="dark"] footer button.active{
    color:#fff;
    background:rgba(208, 10, 10, 0.234);
}

[data-theme="dark"] .div{
    color:#fff;
    background:#161923;
}

[data-theme="dark"] .btn-menu{
    color:#fff;
}

/* =========================
   MODO ESCURO EXTRAS
========================= */

[data-theme="dark"] .alerta{
  box-shadow:0 0 20px rgba(140,10,10,.4);
}

[data-theme="dark"] footer{
  box-shadow:0 -2px 15px rgba(0,0,0,.4);
}


[data-theme="dark"] .contato-item{
  background:var(--input);
}

[data-theme="dark"] input,
[data-theme="dark"] textarea{
  background:var(--input);
}

[data-theme="dark"] h2,
[data-theme="dark"] h3{
  color:var(--texto);
}

</style>
</head>

<body>

<header>
  <img src="locate.png" alt="LOGO">
</header>

<div class="alerta">
  ✏️ EDITE SEU PERFIL
</div>

<div class="container">
  <div class="card">

    <div class="profile-card">
      <div id="fotoCard">
        <i class="fa-solid fa-camera"></i>
      </div>
    </div>

    <label>NOME DO NEGÓCIO</label>
    <input id="nome" placeholder="Nome da sua empresa">

    <label>CATEGORIA</label>
    <input id="categoria" placeholder="Ex.: Sorveteria, Mercado, Banco">

    <label>DESCRIÇÃO</label>
    <textarea id="descricao" rows="6" placeholder="Deixe uma descrição clara e objetiva sobre seus produtos e serviços."></textarea>

    <label>ENDEREÇO</label>
    <input id="endereco" placeholder="Ex.: Cidade, Bairro, Rua...">

    <div class="section" id="comentarios">
   
      <div class="infos">
      <h3 style="margin-left: 10px;">Comentários</h3>
    <div class="avaliacao">
      <span id="nota" style="margin-left: 10px;">0</span>
    </div>
</div>

<div class="infos">
    <h3 style="margin-left: 10px;">Avaliação</h3>
    <div class="avaliacao">
      <span id="nota" style="margin-left: 10px;">0</span>
      <i class="fa-solid fa-star"></i>
    </div>
</div>

  </div>
  <h3>Horário de Funcionamento</h3>
<div class="ora">
  <div class="ora2">
  

<label>Abertura</label>

<input
type="time"
id="abertura">
</div>

<div class="ora2">
<label>Fechamento</label>

<input
type="time"
id="fechamento">
</div>
</div>

    <div class="container2">

    </div>

   <div class="contato">
  <div class="contato-item">
    <i class="fa-solid fa-phone"></i>
    <input type="text" id="telefone" placeholder="Telefone">
  </div>

  <div class="contato-item">
    <i class="fa-brands fa-instagram"></i>
    <input type="text" id="instagram" placeholder="@instagram">
  </div>

  <div class="contato-item">
    <i class="fa-brands fa-whatsapp"></i>
    <input type="text" id="whatsapp" placeholder="WhatsApp">
  </div>
</div>


    <button id="salvar">SALVAR PERFIL</button>

    
    </div>
</div>
    </div>

  </div>
</div>
<footer>
<button onclick="window.location.href='cadastro.fila.online.html'" id="inicio" class="nav-item"><i class="fa-solid fa-house" id="home"></i><span>Cadastro</span></button>
<button onclick="window.location.href='catalogoEmpresario.prototipo.html'" id="produto" class="nav-item"><i class="fa-solid fa-clipboard-list"></i><span>Produtos</span></button>
<button onclick="window.location.href='fila.online.html'" class="nav-item"><i class="fa-solid fa-users-line" id="fila"></i><span>Fila</span></button>
<button onclick="window.location.href='perfilEmpresario.prototipo.html'" id="perfil" class="active"><i class="fa-solid fa-user"></i><span>Perfil</span></button>
<button onclick="window.location.href='Confi.prototipo.html'" id="confi" class="nav-item"><i class="fa-solid fa-gear"></i><span>Config</span></button>
</footer>
  </div>

<input type="file" id="inputFoto" accept="image/*" hidden>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
    getStorage,
    ref,
    uploadBytesResumable,
    getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  addDoc,
  collection,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyAvXF36Fi9K25Ub1czRkZ_G9OQ_dwcm5rk",
  authDomain: "locatego.firebaseapp.com",
  projectId: "locatego",
  storageBucket: "locatego.appspot.com",
  messagingSenderId: "904411855752",
  appId: "1:904411855752:web:9e2ae088dca6b4bfd3d83d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* =========================
   CARREGAR TEMA SALVO
========================= */

(function(){

    const tema =
    localStorage.getItem("temaAtual");

    if(tema === "dark"){

        document.documentElement
        .setAttribute(
            "data-theme",
            "dark"
        );

    }

    else if(tema === "light"){

        document.documentElement
        .removeAttribute(
            "data-theme"
        );

    }

    else if(tema === "auto"){

        const escuro =
        window.matchMedia(
        "(prefers-color-scheme: dark)"
        ).matches;

        if(escuro){

            document.documentElement
            .setAttribute(
                "data-theme",
                "dark"
            );

        }

    }

})();


async function registrarUso(acao, dados = {}) {

  const usuario = auth.currentUser;

  try {

    await addDoc(collection(db, "logs"), {

      usuario: usuario?.email || "Empresa",

      tipo: "EMPRESA",

      uid: usuario?.uid || null,

      acao,

      dados,

      pagina: window.location.pathname,

      navegador: navigator.userAgent,

      horario: serverTimestamp()

    });

  } catch (erro) {

    console.error("Erro ao registrar log:", erro);

  }

}

/* =========================
   VARIÁVEIS
========================= */
let uid = null;
let fotoAtual = "";
let uploadTask = null;

const fotoCard = document.getElementById("fotoCard");
const inputFoto = document.getElementById("inputFoto");
const salvar = document.getElementById("salvar");

const nome = document.getElementById("nome");
const categoria = document.getElementById("categoria");
const descricao = document.getElementById("descricao");
const endereco = document.getElementById("endereco");
const telefone = document.getElementById("telefone");
const whatsapp = document.getElementById("whatsapp");
const instagram = document.getElementById("instagram");

const abertura = document.getElementById("abertura");
const fechamento = document.getElementById("fechamento");

/*  Clique na foto */
fotoCard.addEventListener("click", () => inputFoto.click());

/*  Auth */
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  uid = user.uid;

  await registrarUso(
  "acessou_perfil_empresa",
  {
    tela: "perfil_empresa"
  }
);

  const snap = await getDoc(doc(db, "perfilEmpresa", uid));
  if (snap.exists()) {
    const d = snap.data();
    nome.value = d.nome || "";
    categoria.value = d.categoria || "";
    descricao.value = d.descricao || "";
    endereco.value = d.endereco || "";
    telefone.value = d.telefone || "";
whatsapp.value = d.whatsapp || "";
instagram.value = d.instagram || "";
abertura.value = d.abertura || "";
fechamento.value = d.fechamento || "";

    if (d.foto) {
      fotoCard.innerHTML = `<img src="${d.foto}">`;
      fotoAtual = d.foto;
    }
  }
});

/* 🖼️ Upload da foto (em segundo plano) */
inputFoto.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file || !uid) return;

  // Preview imediato
  fotoCard.innerHTML = `<img src="${URL.createObjectURL(file)}">`;

  const fotoRef = ref(storage, `perfilEmpresa/${uid}.jpg`);
  uploadTask = uploadBytesResumable(fotoRef, file);

  uploadTask.on(
    "state_changed",
    null, // não precisamos do progresso
    (error) => {
      console.error("Erro no upload da foto:", error);
      alert("❌ Erro ao enviar a foto");
    },
    async () => {
      fotoAtual = await getDownloadURL(uploadTask.snapshot.ref);

      // Atualiza a foto no Firestore assim que termina
      if (uid) {
        const perfilRef = doc(db, "perfilEmpresa", uid);
        await setDoc(perfilRef, { foto: fotoAtual }, { merge: true });
        console.log("✅ Foto atualizada no Firestore");
      }
    }
  );
});

/* SALVAR PERFIL SEM ESPERAR FOTO */
salvar.addEventListener("click", async () => {
  if (!uid) return alert("Erro de autenticação");

  try {
    const perfilRef = doc(db, "perfilEmpresa", uid);
    await setDoc(perfilRef,{

    nome: nome.value.trim(),

    categoria: categoria.value.trim(),

    descricao: descricao.value.trim(),

    endereco: endereco.value.trim(),

    telefone: telefone.value.trim(),

    whatsapp: whatsapp.value.trim(),

    instagram: instagram.value.trim(),

    abertura: abertura.value,

    fechamento: fechamento.value,

    foto: fotoAtual,

    tipo:"empresario",

    atualizadoEm: serverTimestamp()

},{merge:true});

await registrarUso(
  "salvou_perfil_empresa",
  {
    nome: nome.value.trim(),
    categoria: categoria.value.trim()
  }
);

alert("Perfil salvo!");

setTimeout(() => {

  window.location.href =
    "registro.prototipo.html";

}, 1000);

  } catch (erro) {
    console.error("Erro ao salvar perfil:", erro);
    alert("Erro ao salvar perfil");
  }
});


//contatos
document.querySelectorAll('.contato-item input').forEach(input => {
  input.addEventListener('focus', () => {
    input.style.pointerEvents = 'auto';
  });
});

</script>

<script src="tema.js"></script>

</body>
</html>
