<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fila Online</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
}

/* HEADER */

.header{
background:#510e0e;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

/* CARDS */

.cards{
display:flex;
gap:10px;
padding:15px;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

.card span{
font-size:35px;
font-weight:bold;
display:block;
margin-top:5px;
}

#totalFila {
    font-size: 70px;
    margin-top: 10px;
}


/* INPUT HORA */

#hora{
margin-top:0px;
padding:8px;
border-radius:6px;
border:0;
font-size:16px;
text-align:center;
}

/* FORM */

.cadastro, #Tipo, #pagamento{
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.cadastro input, #Tipo, #pagamento{
padding:14px;
border-radius:8px;
border:1px solid #ccc;
font-size:18px;
}

.cadastro button{
background:#087e39;
border:none;
color:white;
padding:14px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

/* QUANTIDADE */

.quantidade{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
background:white;
padding:5px;
border-radius:8px;
border:1px solid #ccc;
}

.quantidade button{
font-size:22px;
width:30px;
height:30px;
border:none;
border-radius:6px;
background:#ddd;
cursor:pointer;
}

.quantidade span{
font-size:30px;
font-weight:bold;
min-width:50px;
text-align:center;
}

#menos, #mais {
    padding: 0px 5px;
    background: #8e1313;
    font-size:20px;
}
/* LISTA */

.lista{
padding:15px;
background: #ffffff;
max-width: 90%;
margin: 5%;
}

.lista h3{
margin-bottom:10px;
}

ul{
list-style:none;
}

li{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.info{
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
text-transform:capitalize;
width:100%;
}

.oculto {
    background-color: #ffffff;
    display:none;
    flex-direction:column;
    font-size: 20px;
    text-transform: capitalize;
    flex: 2;
    border-radius: 8px;
    padding:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    border: 0;
}

.detalhes{
display:flex;
flex-direction:column;
}

#check {
    flex: 1;
    border: none;
    color: white;
    background-color: #087e39;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-right: 0;
}

.remover{
flex: 1;
background:#7a150a;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin: 0px 20px;
}

.alterar{
display:flex;
gap:10px;
flex-shrink:0;
}

/* BOTÃO CHAMAR */

.chamar{
margin:15px;
width:calc(100% - 30px);
padding:14px;
background:#870c0c;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

/* MENU */

footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

footer button{
background:none;
border:none;
padding:16px;
font-size:22px;
cursor:pointer;
}

#home{
color:#591212;
}


</style>
</head>

<body>

<div class="header">
FILA PRESENCIAL
</div>

<div class="cards">

<div class="card">
FILA ATUAL:
<span id="totalFila">0</span>
</div>

<div class="card">
Último Pedido
<span id="ultimoChamado">---</span><br>
<input type="time" id="hora">
</div>

</div>

<!-- FORM -->

<div class="cadastro">

<input type="text" id="nome" placeholder="Nome do Cliente">

<input type="text" id="servico" placeholder="Serviço solicitado">

<input type="text" id="observacao" placeholder="Observação">

<input type="text" id="preco" placeholder="Valor">

<select id="Tipo" name="Tipo">
  <option value="presencial">Presencial</option>
  <option value="retirada">Retirada</option>
  <option value="delivery">Delivery</option>
  <option value="outro">Outro</option>
</select>

<select id="pagamento" name="pagamento">
  <option value="pix">PIX</option>
  <option value="dinheiro">Dinheiro</option>
  <option value="cartao">Cartão</option>
  <option value="outro">Outro</option>
</select>

<div class="quantidade">
<button onclick="diminuir()" id="menos">−</button>
<span id="quantidade">1</span>
<button onclick="aumentar()" id="mais">+</button>
</div>

<button onclick="adicionarPessoa()">
Adicionar à fila
</button>

</div>

<div class="card">
Relatório Hoje
<span id="relatorio">0</span>
</div>

<!-- LISTA -->

<div class="lista">

<h3>FILA ONLINE:</h3>

<hr style="margin: 30px;">

<div class="fila"><ul id="filaLista"></ul></div>

<hr style="margin: 40px;">

</div>

<footer>
<button onclick="window.location.href='fila.online.html'"><i class="fa-solid fa-house" id="home"></i></button>
<button onclick="window.location.href='catalogoEmpresario.prototipo.html'"><i class="fa-solid fa-clipboard-list"></i></button>
<button onclick="window.location.href='perfilEmpresario.prototipo.html'"><i class="fa-solid fa-user"></i></button>
<button onclick="window.location.href='Confi.prototipo.html'"><i class="fa-solid fa-gear"></i></button>
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  query,
  orderBy,
  getDocs,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


import {
  getAuth
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
/* =========================
   FIREBASE
========================= */

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "locatego.firebaseapp.com",
  projectId: "locatego",
  storageBucket: "locatego.firebasestorage.app",
  messagingSenderId: "904411855752",
  appId: "1:904411855752:web:8a2cb38545cba994d3d83d"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

/* =========================
   VARIÁVEIS
========================= */

let fila = [];
let quantidadeAtual = 1;
let ultimoChamado = "---";


/* =========================
   ELEMENTOS
========================= */

const totalFila = document.getElementById("totalFila");
const ultimoChamadoElemento = document.getElementById("ultimoChamado");
const relatorioElemento = document.getElementById("relatorio");
const filaLista = document.getElementById("filaLista");

const nomeInput = document.getElementById("nome");
const servicoInput = document.getElementById("servico");
const observacaoInput = document.getElementById("observacao");
const precoInput = document.getElementById("preco");

const tipoInput = document.getElementById("Tipo");
const pagamentoInput = document.getElementById("pagamento");

const quantidadeElemento = document.getElementById("quantidade");
const horaInput = document.getElementById("hora");

ultimoChamadoElemento.innerText = ultimoChamado;


/* =========================
   LOGS
========================= */

async function registrarUso(acao, dados = {}) {

  try {

    const usuario = auth.currentUser;

    await addDoc(collection(db, "logs"), {

      usuario: usuario?.email || "Empresa",

      uid: usuario?.uid || null,

      tipo: "EMPRESA",

      acao,

      dados,

      pagina: window.location.pathname,

      navegador: navigator.userAgent,

      horario: serverTimestamp()

    });

  } catch (erro) {

    console.error("Erro ao registrar log:", erro);

  }

}


/* =========================
   FILA TEMPO REAL
========================= */

const filaRef = collection(db, "fila");

const filaOrdenada = query(
  filaRef,
  orderBy("criadoEm")
);

onSnapshot(filaOrdenada, (snapshot) => {

  fila = [];

  snapshot.forEach((docItem) => {

    fila.push({
      id: docItem.id,
      ...docItem.data()
    });

  });

  renderFila();

  gerarRelatorio();

});


/* =========================
   MÁSCARA PREÇO
========================= */

precoInput.addEventListener("input", (e) => {

  let valor = e.target.value;

  valor = valor.replace(/\D/g, "");

  valor = (valor / 100).toFixed(2) + "";

  valor = valor.replace(".", ",");

  valor = valor.replace(
    /\B(?=(\d{3})+(?!\d))/g,
    "."
  );

  valor = "R$ " + valor;

  e.target.value = valor;

});


/* =========================
   ADICIONAR PESSOA
========================= */

window.adicionarPessoa = async function () {

  const nome = nomeInput.value.trim();

  const servico = servicoInput.value.trim();

  if (nome === "" || servico === "") {

    alert("Preencha os campos obrigatórios");

    return;

  }

  let precoLimpo = precoInput.value.replace(/\D/g, "");

  let precoNumero =
    precoLimpo ? precoLimpo / 100 : 0;

  try {

    await addDoc(collection(db, "fila"), {

      nome,

      servico,

      observacao: observacaoInput.value,

      Tipo: tipoInput.value,

      pagamento: pagamentoInput.value,

      preco: precoNumero,

      quantidade: quantidadeAtual,

      criadoEm: serverTimestamp()

    });

    await registrarUso(
      "adicionou_na_fila",
      {
        nome,
        servico,
        preco: precoNumero,
        quantidade: quantidadeAtual
      }
    );

    limparFormulario();

  } catch (erro) {

    console.error("Erro ao adicionar:", erro);

  }

};


/* =========================
   LIMPAR FORM
========================= */

function limparFormulario() {

  nomeInput.value = "";

  servicoInput.value = "";

  observacaoInput.value = "";

  precoInput.value = "";

  tipoInput.selectedIndex = 0;

  pagamentoInput.selectedIndex = 0;

  quantidadeAtual = 1;

  quantidadeElemento.innerText = "1";

}


/* =========================
   RENDER FILA
========================= */

function renderFila() {

  filaLista.innerHTML = "";

  fila.forEach((pessoa, index) => {

    let precoFormatado = pessoa.preco
      ? pessoa.preco.toLocaleString(
          "pt-BR",
          {
            style: "currency",
            currency: "BRL"
          }
        )
      : "R$ 0,00";

    filaLista.innerHTML += `

<li>

  <div class="info"
       onclick="mostrarDiv(${index})">

    <strong>
      ${index + 1}. ${pessoa.nome}
    </strong>

  </div>

  <div class="alterar">

    <button
      id="check"
      onclick="finalizarPessoa('${pessoa.id}')">
      ✔
    </button>

    <button
      class="remover"
      onclick="removerPessoa('${pessoa.id}')">
      X
    </button>

  </div>

</li>

<li>

  <div
    id="oculto${index}"
    class="oculto">

    <strong>${pessoa.Tipo}</strong>

    <div class="detalhes">

      <small>
        Serviço: ${pessoa.servico}
      </small><br>

      <small>
        Obs.: ${pessoa.observacao}
      </small><br>

      <small>
        Pagamento: ${pessoa.pagamento}
      </small><br>

      <small>
        Preço: ${precoFormatado}
      </small><br>

      <small>
        Qnt.: ${pessoa.quantidade}
      </small>

    </div>

  </div>

</li>

`;

  });

  totalFila.innerText = fila.length;

}


/* =========================
   MOSTRAR DETALHES
========================= */

window.mostrarDiv = async function(index){

  const div =
    document.getElementById(
      "oculto" + index
    );

  div.style.display =
    div.style.display === "block"
    ? "none"
    : "block";

  await registrarUso(
    "abriu_detalhes",
    { index }
  );

};


/* =========================
   QUANTIDADE
========================= */

window.aumentar = async function(){

  quantidadeAtual++;

  quantidadeElemento.innerText =
    quantidadeAtual;

  await registrarUso(
    "aumentou_quantidade",
    { quantidadeAtual }
  );

};


window.diminuir = async function(){

  if(quantidadeAtual > 1){

    quantidadeAtual--;

    quantidadeElemento.innerText =
      quantidadeAtual;

    await registrarUso(
      "diminuiu_quantidade",
      { quantidadeAtual }
    );

  }

};


/* =========================
   REMOVER
========================= */

window.removerPessoa =
async function(id){

  try {

    await deleteDoc(
      doc(db, "fila", id)
    );

    await registrarUso(
      "removeu_pessoa",
      { id }
    );

  } catch(erro){

    console.error(
      "Erro ao remover:",
      erro
    );

  }

};


/* =========================
   FINALIZAR
========================= */

window.finalizarPessoa =
async function(id){

  try {

    await deleteDoc(
      doc(db, "fila", id)
    );

    await registrarUso(
      "finalizou_pedido",
      { id }
    );

  } catch(erro){

    console.error(
      "Erro ao finalizar:",
      erro
    );

  }

};


/* =========================
   RELATÓRIO
========================= */

async function gerarRelatorio(){

  try {

    const snapshot =
      await getDocs(
        collection(db, "logs")
      );

    let totalAcoes = 0;

    snapshot.forEach(() => {

      totalAcoes++;

    });

    relatorioElemento.innerText =
      totalAcoes;

  } catch(erro){

    console.error(
      "Erro relatório:",
      erro
    );

  }

}


/* =========================
   HORA
========================= */

function atualizarHora(){

  let agora = new Date();

  let horas = agora
    .getHours()
    .toString()
    .padStart(2, "0");

  let minutos = agora
    .getMinutes()
    .toString()
    .padStart(2, "0");

  horaInput.value =
    `${horas}:${minutos}`;

}

setInterval(atualizarHora, 1000);

atualizarHora();


/* =========================
   LOG ACESSO TELA
========================= */

window.addEventListener(
  "load",
  async () => {

    await registrarUso(
      "acessou_tela",
      {
        tela: "fila_presencial"
      }
    );

  }
);


/* =========================
   LOG CLIQUES
========================= */

document.addEventListener(
  "click",
  async (e) => {

    try {

      const texto =
        e.target.innerText || "";

      await registrarUso(
        "clique",
        {
          elemento: e.target.tagName,
          texto
        }
      );

    } catch(erro){

      console.error(erro);

    }

  }
);


/* =========================
   ERROS SISTEMA
========================= */

window.addEventListener(
  "error",
  async (erro) => {

    await registrarUso(
      "erro_sistema",
      {
        mensagem: erro.message,
        arquivo: erro.filename,
        linha: erro.lineno
      }
    );

  }
);

await addDoc(collection(db, "logs"), {

    usuario: "Empresa",

    tipo: "EMPRESA",

    acao,

    dados,

    pagina:
    window.location.pathname,

    navegador:
    navigator.userAgent,

    horario:
    serverTimestamp()

});

</script>

</body>
</html>
