<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fila Online</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
}

/* HEADER */

.header{
background:#510e0e;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

/* CARDS */

.cards{
display:flex;
gap:10px;
padding:15px;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

.card span{
font-size:35px;
font-weight:bold;
display:block;
margin-top:5px;
}

#totalFila {
    font-size: 70px;
    margin-top: 10px;
}


/* INPUT HORA */

#hora{
margin-top:0px;
padding:8px;
border-radius:6px;
border:0;
font-size:16px;
text-align:center;
}

/* FORM */

.cadastro, #Tipo, #pagamento{
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.cadastro input, #Tipo, #pagamento{
padding:14px;
border-radius:8px;
border:1px solid #ccc;
font-size:18px;
}

.cadastro button{
background:#087e39;
border:none;
color:white;
padding:14px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

/* QUANTIDADE */

.quantidade{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
background:white;
padding:5px;
border-radius:8px;
border:1px solid #ccc;
}

.quantidade button{
font-size:22px;
width:30px;
height:30px;
border:none;
border-radius:6px;
background:#ddd;
cursor:pointer;
}

.quantidade span{
font-size:30px;
font-weight:bold;
min-width:50px;
text-align:center;
}

#menos, #mais {
    padding: 0px 5px;
    background: #8e1313;
    font-size:20px;
}
/* LISTA */

.lista{
padding:15px;
}

.lista h3{
margin-bottom:10px;
}

ul{
list-style:none;
}

li{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.info{
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
text-transform:capitalize;
width:100%;
}

.oculto {
    background-color: #ffffff;
    display:none;
    flex-direction:column;
    font-size: 20px;
    text-transform: capitalize;
    flex: 2;
    border-radius: 8px;
    padding:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    border: 0;
}

.detalhes{
display:flex;
flex-direction:column;
}

#check {
    flex: 1;
    border: none;
    color: white;
    background-color: #087e39;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-right: 0;
}

.remover{
flex: 1;
background:#7a150a;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin: 0px 20px;
}

.alterar{
display:flex;
gap:10px;
flex-shrink:0;
}

/* BOTÃO CHAMAR */

.chamar{
margin:15px;
width:calc(100% - 30px);
padding:14px;
background:#870c0c;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

/* MENU */

footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

footer button{
background:none;
border:none;
padding:16px;
font-size:22px;
cursor:pointer;
}

#home{
color:#591212;
}

</style>
</head>

<body>

<div class="header">
FILA PRESENCIAL
</div>

<div class="cards">

<div class="card">
FILA ATUAL:
<span id="totalFila">0</span>
</div>

<div class="card">
Último Pedido
<span id="ultimoChamado">---</span><br>
<input type="time" id="hora">
</div>

</div>

<!-- FORM -->

<div class="cadastro">

<input type="text" id="nome" placeholder="Nome do Cliente">

<input type="text" id="servico" placeholder="Serviço solicitado">

<input type="text" id="observacao" placeholder="Observação">

<select id="Tipo" name="Tipo">
  <option value="presencial">Presencial</option>
  <option value="retirada">Retirada</option>
  <option value="delivery">Delivery</option>
  <option value="outro">Outro</option>
</select>

<select id="pagamento" name="pagamento">
  <option value="pix">PIX</option>
  <option value="dinheiro">Dinheiro</option>
  <option value="cartao">Cartão</option>
  <option value="outro">Outro</option>
</select>

<div class="quantidade">
<button onclick="diminuir()" id="menos">−</button>
<span id="quantidade">1</span>
<button onclick="aumentar()" id="mais">+</button>
</div>

<button onclick="adicionarPessoa()">
Adicionar à fila
</button>

</div>

<!-- LISTA -->

<div class="lista">

<h3>FILA ONLINE:</h3>

<hr style="margin: 30px;">

<ul id="filaLista"></ul>

<hr style="margin: 40px;">

</div>

<footer>
<button onclick="window.location.href='fila.online.html'"><i class="fa-solid fa-house" id="home"></i></button>
<button onclick="window.location.href='catalogoEmpresario.prototipo.html'"><i class="fa-solid fa-clipboard-list"></i></button>
<button onclick="window.location.href='perfilEmpresario.prototipo.html'"><i class="fa-solid fa-user"></i></button>
<button onclick="window.location.href='configuracao.html'"><i class="fa-solid fa-gear"></i></button>   
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "locatego.firebaseapp.com",
  projectId: "locatego",
  storageBucket: "locatego.firebasestorage.app",
  messagingSenderId: "904411855752",
  appId: "1:904411855752:web:8a2cb38545cba994d3d83d"
};

/* 🔥 INICIAR */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 VARIÁVEIS */
let fila = [];
let quantidadeAtual = 1;
let ultimoChamado = "---";

document.getElementById("ultimoChamado").innerText = ultimoChamado;

/* 🔥 TEMPO REAL (ORDENADO POR CRIAÇÃO) */
const filaRef = collection(db, "fila");
const filaOrdenada = query(filaRef, orderBy("criadoEm"));

onSnapshot(filaOrdenada, (snapshot) => {

  fila = [];

  snapshot.forEach((docItem) => {
    fila.push({ id: docItem.id, ...docItem.data() });
  });

  renderFila();

});

/* 🔥 ADICIONAR */
window.adicionarPessoa = async function(){

  const nome = document.getElementById("nome").value.trim();
  const servico = document.getElementById("servico").value.trim();

  if(nome === "" || servico === ""){
    alert("Preencha os campos obrigatórios");
    return;
  }

  await addDoc(collection(db, "fila"), {
    nome,
    servico,
    observacao: document.getElementById("observacao").value,
    Tipo: document.getElementById("Tipo").value,
    pagamento: document.getElementById("pagamento").value,
    quantidade: quantidadeAtual,
    criadoEm: new Date()
  });

  // limpar campos
  document.getElementById("nome").value = "";
  document.getElementById("servico").value = "";
  document.getElementById("observacao").value = "";
  document.getElementById("Tipo").selectedIndex = 0;
  document.getElementById("pagamento").selectedIndex = 0;

  quantidadeAtual = 1;
  document.getElementById("quantidade").innerText = "1";

};

/* 🔥 REMOVER */
window.removerPessoa = async function(id){
  await deleteDoc(doc(db, "fila", id));
};

/* 🔥 CHAMAR PRÓXIMO */
window.chamarProximo = async function(){

  if(fila.length === 0){
    alert("Fila vazia");
    return;
  }

  const pessoa = fila[0];

  ultimoChamado = pessoa.nome;
  document.getElementById("ultimoChamado").innerText = ultimoChamado;

  atualizarHora();

  await deleteDoc(doc(db, "fila", pessoa.id));

};

/* 🔥 RENDER */
function renderFila(){

  const lista = document.getElementById("filaLista");
  lista.innerHTML = "";

  fila.forEach((pessoa, index) => {

    lista.innerHTML += `

<li>
  <div class="info" onclick="mostrarDiv(${index})">
    <strong>${index+1}. ${pessoa.nome}</strong>
  </div>

  <div class="alterar">
    <button id="check" onclick="chamarProximo()">✔</button>
    <button class="remover" onclick="removerPessoa('${pessoa.id}')">X</button>
  </div>
</li>

<li>
  <div id="oculto${index}" class="oculto">
    <strong>${pessoa.Tipo}</strong>

    <div class="detalhes">
      <small>Serviço: ${pessoa.servico}</small><br>
      <small>Obs.: ${pessoa.observacao}</small><br>
      <small>Pagamento: ${pessoa.pagamento}</small><br>
      <small>Qnt.: ${pessoa.quantidade}</small>
    </div>
  </div>
</li>

`;
  });

  document.getElementById("totalFila").innerText = fila.length;

}

/* 🔥 MOSTRAR / OCULTAR */
window.mostrarDiv = function(index){
  let div = document.getElementById("oculto"+index);
  div.style.display = div.style.display === "block" ? "none" : "block";
};

/* 🔥 QUANTIDADE */
window.aumentar = function(){
  quantidadeAtual++;
  document.getElementById("quantidade").innerText = quantidadeAtual;
};

window.diminuir = function(){
  if(quantidadeAtual > 1){
    quantidadeAtual--;
    document.getElementById("quantidade").innerText = quantidadeAtual;
  }
};

/* 🔥 HORA */
function atualizarHora(){
  let agora = new Date();
  let horas = agora.getHours().toString().padStart(2,"0");
  let minutos = agora.getMinutes().toString().padStart(2,"0");
  document.getElementById("hora").value = `${horas}:${minutos}`;
}

setInterval(atualizarHora, 1000);

</script>

</body>
</html>
