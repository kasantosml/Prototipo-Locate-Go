<style>

    :root{
  --primary:#d30e0e;

  /* CLARO */
  --bg:#f4f6f9;
  --header1:#d30e0e;
  --header2:#6d0909;

  --card:#ffffff;
  --card-hover:#fafafa;

  --text:#222222;
  --text-secondary:#555555;

  --title:#8c0a0a;

  --footer:#ffffff;

  --border:#ececec;

  --shadow:
  0 6px 20px rgba(0,0,0,.08);

  --shadow-hover:
  0 10px 25px rgba(0,0,0,.12);
}

/* =========================
   TEMA ESCURO
========================= */

[data-theme="dark"]{
  --bg:#0c0e14;

  --header1:#a50c0c;
  --header2:#4b0707;

  --card:#161923;
  --card-hover:#1f2431;

  --text:#ffffff;
  --text-secondary:#c8c8c8;

  --title:#ffffff;

  --footer:#161923;

  --border:rgba(255,255,255,.08);

  --shadow:
  0 6px 20px rgba(0,0,0,.35);

  --shadow-hover:
  0 10px 25px rgba(0,0,0,.45);
}

/* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',Arial,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  padding-bottom:90px;
  transition:.3s;
}

/* HEADER */

.header {
  background:linear-gradient(
    135deg,
    var(--header1),
    var(--header2)
  );
  color:#fff;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}


/* CARDS */

.cards {
  display:flex;
  gap:10px;
  padding:15px;
}

.card {
  flex:1;
  background:var(--card);
  color:var(--text);
  padding:15px;
  border-radius:12px;
  box-shadow:var(--shadow);
  text-align:center;
  border:1px solid var(--border);
}

.card span {
  font-size:35px;
  font-weight:bold;
  display:block;
  margin-top:5px;
}

.filas{
  text-align: center;
    display:flex;
    flex-wrap:wrap;
margin: 5px;
    display: flex;
  
}

.div{
    width:calc(50% - 20px);
    background:#ffffff;
    padding: 20px;
    box-sizing:border-box;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    border-radius: 12px;
    border:1px solid var(--border);
    margin: 10px;
}

.filas h6 {
  font-size: 15px;
}

#totalFila{
  font-size:70px;
  margin-top:10px;
}

/* HORA */

#hora{
  margin-top:0;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--input);
  color:var(--text);
  font-size:16px;
  text-align:center;
}

/* CONTAINER */

.lista, .listas{
  max-width:900px;
  margin:20px auto;
  padding:20px;
  
}

.lista h3, .listas {
  color:var(--title);
  font-size:22px;
  font-weight:700;
  margin-bottom:15px;
}

hr{
  border:none;
  border-top:1px solid var(--border);
}

/* FILA */

ul{
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* CARD */

li{
  background:var(--card);
  border-radius:18px;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:var(--shadow);
  transition:.25s;
  border-left:5px solid var(--primary);
  position:relative;
    z-index:1;
}

li:hover, li:active{
  background:linear-gradient(
    135deg,
    var(--header1),
    var(--header2)
  );
  transform:translateY(-2px);
  box-shadow:var(--shadow-hover);
}

li.menu-aberto{
    z-index:9999;
}

/* INFO */

.info{
  display:flex;
  align-items:center;
  gap:15px;
  width:100%;
  cursor:pointer;
}

.posicao{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#d32f2f;
    box-shadow: 5px solid black;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:16px;
    flex-shrink:0;
}

.nome{
  font-size:20px !important;
  font-weight:700;
  color:var(--text);
  text-transform:capitalize;
}

/* DETALHES */

.oculto{
  display:none;
  margin-top:10px;
  background:var(--card-hover);
  border-radius:12px;
  padding:14px;
  border:1px solid var(--border);
}

.oculto strong{
  color:var(--title);
  font-size:15px;
}

.detalhes{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:10px;
}

.detalhes small{
  font-size:14px;
  color:var(--text-secondary);
}

/* BOTÕES */

.alterar{
    display:flex;
    gap:10px;
    margin-left:15px;
    position:relative;
}

.menu{

    display:none;

    position:absolute;

    top:35px;

    right:0;

    background:var(--card);

    border-radius:10px;

    border:1px solid var(--border);

    box-shadow:0 5px 15px rgba(0,0,0,.2);

    overflow:hidden;

    z-index: 10000;

}

.menu.active{
    display:block;
}

.menu button{

    width:170px;

    border:none;

    background:none;

    text-align:left;

    cursor:pointer;

    color:var(--text);

    z-index: 11;

    display:flex;

align-items:center;

gap:12px;

padding:14px 18px;

font-size:15px;

}

.menu button:hover{

    background:var(--card-hover);

}

.menu-cores{

    display:none;

    margin-top:8px;

    border-top:1px solid var(--border);

     z-index: 5000;

}

.menu-cores.active{
z-index: 22222;
    display:block;

}

.btn-menu {
  border: none;
  background: none;
  font-size: 20px;
  cursor: pointer;
  z-index: 1;
}

#check, .remover, .marcar{
  border:none;
  color:#000000;
  width:130px;
  height:42px;
  font-size:16px;
  cursor:pointer;
  transition:.2s;
  z-index: 12000;
}

#check:hover, .remover:hover, .marcarr:hover{
  transform:scale(1.05);
}


/*=========================
FOOTER
=========================*/

footer{

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    height:70px;

    display:flex;

    justify-content:space-around;

    align-items:center;

    background:var(--footer);

    border-top:1px solid var(--border);

    box-shadow:0 -3px 12px rgba(0,0,0,.08);

    z-index:99;

}

footer button{

    width:55px;

    height:55px;

    border:none;

    background:none;

    border-radius:50%;

    color:var(--muted);

    font-size:22px;

    cursor:pointer;

    transition:.25s;

}

footer button:hover{

    color:var(--primary);

    background:rgba(129,10,10,.08);

}

footer button.active{

    color:var(--primary);

    background:rgba(129,10,10,.12);

}

[data-theme="dark"] footer button.active{
    color:#fff;
    background:rgba(208, 10, 10, 0.234);
}

}

.filaExtra{

}

.filas{

}


.modal{

    position:fixed;

    left:0;
    top:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.55);

.modal.active{

.modal-content{

height:60px;

border-radius:50%;

transition:.2s;

.fecharModal:hover{

}

background:var(--card);

/*=========================
PESQUISA
=========================*/

.pesquisa{
    display:flex;

.pesquisa i{

.pesquisa input{

.pesquisa input::placeholder{

.arrastando{

/* RESPONSIVO */

@media(max-width:600px){

  }

  }

    padding:14px;
  }
}


</style>

document.addEventListener("click", (e) => {

    // Se clicou dentro do menu, não faz nada
    if (e.target.closest(".menu")) return;

    const botao = e.target.closest(".btn-menu");

    if(botao){

        e.stopPropagation();

        document.querySelectorAll(".menu").forEach(menu=>{
            menu.classList.remove("active");
        });

        document.querySelectorAll(".menu-cores").forEach(menu=>{
            menu.classList.remove("active");
        });

        document.querySelectorAll("li").forEach(li=>{
            li.classList.remove("menu-aberto");
        });

        const li = botao.closest("li");
        li.classList.add("menu-aberto");

        li.querySelector(".menu").classList.add("active");

        return;
    }

    document.querySelectorAll(".menu").forEach(menu=>{
        menu.classList.remove("active");
    });

    document.querySelectorAll(".menu-cores").forEach(menu=>{
        menu.classList.remove("active");
    });

    document.querySelectorAll("li").forEach(li=>{
        li.classList.remove("menu-aberto");
    });
    
    // Fecha o menu das filas específicas
if(!e.target.closest(".menuFila")){

    document
    .querySelectorAll(".opcoesFila")
    .forEach(menu=>menu.classList.remove("active"));

}

//PRIORIZAR
window.ativarPrioridade = function(id){

    const card = document.querySelector(
        `li[data-id="${id}"]`
    );

    console.log("Card encontrado:", card);


    if(!card) return;


    card.draggable = true;
console.log("Draggable:", card.draggable);

    card.classList.add("arrastando");


    card.addEventListener(
        "dragstart",
        iniciarArraste
    );


    card.addEventListener(
        "dragend",
        finalizarArraste
    );


    alert(
      "Agora arraste o cliente para a posição desejada"
    );

}

let cardArrastado = null;


function iniciarArraste(e){

    console.log("DRAG START");

    cardArrastado = this;

    this.classList.add(
        "arrastando"
    );

}


function finalizarArraste(){

    this.classList.remove(
        "arrastando"
    );

    this.draggable=false;

}



document
.getElementById("filaLista")
.addEventListener(
"dragover",
function(e){
    console.log("DRAG OVER");

    e.preventDefault();


    const depois =
    encontrarDepois(this,e.clientY);


    if(depois == null){

        this.appendChild(
            cardArrastado
        );

    }

    else{

        this.insertBefore(
            cardArrastado,
            depois
        );

    }


});



function encontrarDepois(container,y){

    const cards = [
        ...container.querySelectorAll(
            "li:not(.arrastando)"
        )
    ];


    return cards.reduce(
    (maisProximo,card)=>{


        const box =
        card.getBoundingClientRect();


        const offset =
        y - box.top - box.height/2;



        if(
            offset < 0 &&
            offset > maisProximo.offset
        ){

            return {
                offset:offset,
                element:card
            }

        }

        else{

            return maisProximo;

        }


    },
    {
        offset:-Infinity
    }

    ).element;

}
