<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Fila Online</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="tema.css">

<style>

  :root{
  --primary:#8c0a0a;

  /* TEMA CLARO */
  --bg:#f4f6f9;
  --card:#ffffff;
  --card-hover:#f8f8f8;
  --text:#222222;
  --title:#8c0a0a;
  --input:#ffffff;
  --border:#d7d7d7;
  --footer:#ffffff;
  --menu:#ffffff;
  --shadow:0 2px 10px rgba(0,0,0,.10);
}

/* =========================
   TEMA ESCURO
========================= */

[data-theme="dark"]{
  --bg:#0c0e14;
  --card:#161923;
  --card-hover:#1e2130;
  --text:#ffffff;
  --title:#ffffff;
  --input:#1e2130;
  --border:rgba(255,255,255,.08);
  --footer:#161923;
  --menu:#161923;
  --shadow:0 2px 20px rgba(0,0,0,.35);
}

/* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* HEADER */

.header{
  background:linear-gradient(
    135deg,
    #d30e0e,
    #9a0505
  );
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.logo{
    display:flex;
    justify-content:center;
    margin:20px 0;
}

.logo img{
    max-width:50px;
    height:auto;
}

img{
    display: block;
    max-width: 100%;
    width: 60px;
    height: auto;
    margin: 20px auto;
    border-radius: 10px;
}

/* TÍTULOS */

h1,
h2,
h3,
h4,
h5,
h6{
  color:var(--title);
}

/* FORMULÁRIO */

.cadastro,
#Tipo,
#pagamento, #clienteTipo{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.cadastro input,
#Tipo,
#pagamento, #clienteTipo{
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--input);
  color:var(--text);
  font-size:18px;
}

.cadastro input::placeholder{
  color:#888;
}

.cadastro button{
  background:#087e39;
  border:none;
  color:white;
  padding:14px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

/* QUANTIDADE */

.quantidade{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  background:var(--card);
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

.quantidade span{
  color:var(--text);
  font-size:30px;
  font-weight:bold;
}

.quantidade button{
  border:none;
  cursor:pointer;
}

#menos,
#mais{
  padding:0 8px;
  background:#8e1313;
  color:white;
  font-size:20px;
  border-radius:8px;
}

/* LISTA */

.lista{
  padding:15px;
  background:var(--card);
  max-width:90%;
  margin:5%;
  border-radius:12px;
  border:1px solid var(--border);
}

.lista h3{
  color:var(--title);
}

ul{
  list-style:none;
}

li{
  background:var(--card);
  color:var(--text);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}

.info{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
  text-transform:capitalize;
  width:100%;
  color:var(--text);
}

.oculto{
  background:var(--card-hover);
  color:var(--text);
  display:none;
  flex-direction:column;
  font-size:20px;
  text-transform:capitalize;
  flex:2;
  border-radius:10px;
  padding:12px;
  border:1px solid var(--border);
}

.detalhes{
  display:flex;
  flex-direction:column;
}

/* BOTÕES */
#botao {
  position: fixed;
  bottom: 130px;
  z-index: 110;
  width: 90%;
}
#check{
  flex:1;
  border:none;
  color:white;
  background:#087e39;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.remover{
  flex:1;
  background:#7a150a;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  margin:0 20px;
}

.alterar{
  display:flex;
  gap:10px;
}

/* CHAMAR */

.chamar{
  margin:15px;
  width:calc(100% - 30px);
  padding:14px;
  background:#870c0c;
  color:white;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

/* MENU */

.menu{
  position:absolute;
  right:18px;
  top:70px;
  background:var(--menu);
  border-radius:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
  transform:scale(0);
  transform-origin:top right;
  transition:.2s;
  z-index:10;
  width:50%;
  border:1px solid var(--border);
}

.menu.active{
  transform:scale(1);
}

.menu button{
  width:100%;
  padding:15px;
  border:none;
  background:none;
  text-align:left;
  cursor:pointer;
  color:var(--text);
}

.menu button:hover{
  background:var(--primary);
  color:white;
}

/* MAIN */

main{
  padding:20px;
  padding-bottom:160px;
}

#contador{
  color:var(--title);
  font-weight:bold;
  margin-bottom:20px;
}


/* PRODUTO CARD */
.produto{
    position: relative;
  background: var(--card);
  color: var(--text);
  border-radius: 16px; /* <- aqui você controla o arredondamento */
  padding: 16px;
  margin-bottom: 18px;
  box-shadow: 0 8px 18px rgba(0,0,0,.12);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 14px;
  cursor: pointer;
  transition: 0.2s;
}
.produto.selected{
  outline:3px solid var(--primary);
}

h1,
h2,
h3,
h4,
h5,
h6,
#contador{
  color:var(--titulo-cor);
}

.produto p{
  color: var(--text);
  font-size: 18px;
  opacity: 0.9;
}

.produto h3,strong {
  font-size: 25px;
}


.badge{
  position: absolute;
  top: 10px;
  right: 10px;
  width: 35px;
  height: 35px;
  background: rgb(8, 161, 19);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
}

.lixeira {
  z-index: 101;
  position: absolute;
  top: 10px;
  left: 10px; /* canto oposto da badge */
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: #ff0000 !important;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
}

.lixeira:hover {
  transform: scale(1.1);
  background: #10a02a;
}

/* IMAGE CARD */
.image-card{
  width:100%;
  height:160px;
   background:var(--input,#e0e0e0);
  border:1px solid var(--borda);
  color:var(--texto);
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
}

.image-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.produto input,
.produto textarea{
  width:100%;
  border:none;
  outline:none;
  font-size:16px;
  background:transparent;
  color:var(--texto);
}

textarea{ resize:none; }

.produto input::placeholder,
.produto textarea::placeholder{
  color:#8b95a8;
}

/*=========================
FOOTER
=========================*/

footer{

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    height:70px;

    display:flex;

    justify-content:space-around;

    align-items:center;

    background:var(--footer);

    border-top:1px solid var(--border);

    box-shadow:0 -3px 12px rgba(0,0,0,.08);

    z-index:999;

}

footer button{

    width:55px;

    height:55px;

    border:none;

    background:none;

    border-radius:50%;

    color:var(--muted);

    font-size:22px;

    cursor:pointer;

    transition:.25s;

}

footer button:hover{

    color:var(--primary);

    background:rgba(129,10,10,.08);

}

footer button.active{

    color:var(--primary);

    background:rgba(129,10,10,.12);

}

[data-theme="dark"] footer button.active{
    color:#fff;
    background:rgba(208, 10, 10, 0.234);
}

#valorFinal{
    position: fixed;
    bottom: 50px; /* altura do footer */
    left: 0;
    width: 100%;
    z-index: 102;
    padding: 8px 0px;
    background: var(--bg);
    border-top: 1px solid var(--border);
}

.total-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px;
}

.total-card span:first-child{
    font-weight:bold;
    font-size:20px;
}

#totalGeral{
    font-size:30px;
    font-weight:bold;
}

/* TITULOS */

h1,
h2,
h3,
h4,
h5,
h6,
label,
strong{
    color:var(--title);
}

/* INPUTS */

input,
select,
textarea{
    color:var(--text);
    background:var(--input);
}

input::placeholder,
textarea::placeholder{
    color:#8f8f8f;
}

/* CARDS DA FILA */

.card,
.lista,
li,
.oculto,
.produto{
    background:var(--card);
    color:var(--text);
}

/* DETALHES ABERTOS */

.oculto strong,
.oculto small{
    color:var(--text);
}

/* MENU */

.menu{
    background:var(--menu);
}

.menu button{
    color:var(--text);
}


/* SELECT */

#Tipo,
#pagamento{
    background:var(--input);
    color:var(--text);
}

/* HORA */

#hora{
    background:var(--input);
    color:var(--text);
}

/* CONTADOR */

#contador{
    color: var(--title);
}

#clienteTipo{
    color: var(--text);
}

/*=========================
PESQUISA
=========================*/

.pesquisa{
    display:flex;
    align-items:center;
    gap:10px;

    margin:25px 0;

    padding:12px 15px;

    background:var(--card);

    border:1px solid var(--border);

    border-radius:14px;

    box-shadow:var(--shadow);
}

.pesquisa i{
    color:var(--text-secondary);
    font-size:18px;
}

.pesquisa input{

    flex:1;

    border:none;

    outline:none;

    background:transparent;

    color:var(--text);

    font-size:16px;

}

.pesquisa input::placeholder{

    color:var(--text-secondary);

}


</style>
</head>

/* =========================
   TOTAL VALOR
========================= */

function calcularTotalGeral(produtos) {

  let total = 0;

  produtos.forEach(p => {

    const preco = Number(
      String(p.preco || 0)
        .replace("R$", "")
        .replace(/\./g, "")
        .replace(",", ".")
    ) || 0;

    const qtd = Number(p.quantidade) || 0;

    total += preco * qtd;

  });

  // desconto digitado
  const desconto = Number(
    descontoInput.value
      .replace(/\D/g, "")
  ) / 100 || 0;

  // acréscimo digitado
  const acrescimo = Number(
    acrescimoInput.value
      .replace(/\D/g, "")
  ) / 100 || 0;

  total = total - desconto + acrescimo;

  if(total < 0) total = 0;

  document.getElementById("totalGeral").textContent =
    total.toLocaleString("pt-BR",{
      style:"currency",
      currency:"BRL"
    });

}

/* =========================
   MÁSCARA PREÇO
========================= */

function aplicarMascaraMoeda(input) {

  input.addEventListener("input", (e) => {

    let valor = e.target.value.replace(/\D/g, "");

    if (valor === "") {
      e.target.value = "";
      return;
    }

    valor = (Number(valor) / 100).toFixed(2);

    valor = valor.replace(".", ",");

    valor = valor.replace(
      /\B(?=(\d{3})+(?!\d))/g,
      "."
    );

    e.target.value = "R$ " + valor;

  });

  calcularTotalGeral(produtosArray);

}

    observacaoInput.value.trim(),

    clienteTipo: clienteTipoInput.value,

    cor: cor,

   filaId: filaIdSelecionada,
tipo: tipoInput.options[tipoInput.selectedIndex].text,

    pagamento:
    pagamentoInput.value,

    desconto:
    descontoNumero,

    acrescimo:
    acrescimoNumero,

    produtos:
    produtosPedido,

    total:
    document.getElementById("totalGeral").innerText,

    status:
    "aguardando",

    criadoEm:
    serverTimestamp()

});

    await registrarUso(
    "adicionou_na_fila",
    {
        funcionario,
        cliente,
        desconto: descontoNumero,
        acrescimo: acrescimoNumero
    }
);

    limparFormulario();

  }

  catch (erro) {

    console.error(
      "Erro ao adicionar:",
      erro
    );

  }

};

/* =========================
   SELECTS
========================= */

tipoInput.addEventListener("change", async () => {

    if (tipoInput.value !== "__novo__") return;

    const nome = prompt("Digite o nome da nova categoria:");

    if (!nome) {
        tipoInput.selectedIndex = 0;
        return;
    }

    await addDoc(collection(db, "categoriasTipo"), {
        nome: nome.trim()
    });

    setTimeout(() => {
        tipoInput.value = nome.trim();
    }, 300);

});

/* =========================
   LIMPAR FORM
========================= */

async function limparFormulario() {

    // Campos
    document.getElementById("cliente").value = "";
    nomeInput.value = "";
    observacaoInput.value = "";
    descontoInput.value = "";
    acrescimoInput.value = "";

    tipoInput.selectedIndex = 0;
    pagamentoInput.selectedIndex = 0;

    // Limpa produtos do pedido
    produtosPedido = [];

    // Zera o total
    document.getElementById("totalGeral").textContent =
        "R$ 0,00";

    // Zera quantidade de TODOS os produtos
    const snapshot = await getDocs(collection(db,"produtos"));

    for(const produto of snapshot.docs){

        await updateDoc(
            doc(db,"produtos",produto.id),
            {
                quantidade:0
            }
        );

    }

    // Recalcula
    calcularTotalGeral([]);

}

/* =========================
   RELATÓRIO
========================= */

async function registrarUso(
    acao,
    dados={}
){

    try{

        const usuario=auth.currentUser;

        await addDoc(
            collection(db,"logs"),
            {

                usuario:
                usuario?.email || "Empresa",

                uid:
                usuario?.uid || null,

                tipo:"EMPRESA",

                acao,

                dados,

                pagina:
                window.location.pathname,

                navegador:
                navigator.userAgent,

                horario:
                serverTimestamp()

            }
        );

    }

    catch(erro){

        console.error(
            "Erro ao registrar log:",
            erro
        );

    }

}
