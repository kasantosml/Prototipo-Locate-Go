        )
    ];


    return cards.reduce(
    (maisProximo,card)=>{


        const box =
        card.getBoundingClientRect();


        const offset =
        y - box.top - box.height/2;



        if(
            offset < 0 &&
            offset > maisProximo.offset
        ){

            return {
                offset:offset,
                element:card
            }

        }

        else{

            return maisProximo;

        }


    },
    {
        offset:-Infinity
    }

    ).element;

}

async function atualizarQuantidadeFila(card){

    const idFila = card.getAttribute("data-id");

    if(!idFila) return;


    const consulta = query(
        collection(db,"fila"),
        where("filaId","==",idFila)
    );


    onSnapshot(consulta,(snapshot)=>{


        const numero = 
        card.querySelector(".quantidadeFila");


        if(numero){

            numero.textContent = snapshot.size;

        }


    });


}

lucide.createIcons();
